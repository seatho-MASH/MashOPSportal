<style>
  :root{

    --txt:#e7ecf6; --mut:#93a0bd; --dim:#64728f;
    --accent:#00d4aa; --accent2:#818cf8; --warn:#f59e0b; --bad:#f87171; --good:#34d399;

  html[data-theme="light"] .side,html[data-theme="light"] .panel{box-shadow:0 1px 3px rgba(15,23,42,.06)}
  html[data-theme="light"] .banner{background:rgba(99,102,241,.08);border-color:rgba(99,102,241,.25);color:#3b3f8f}
  html[data-theme="light"] .btn:hover{background:#e7ecf6;border-color:#c3ccdd}
  html[data-theme="light"] .evt:hover{background:#f2f5fb}
  *{box-sizing:border-box}
  html,body{margin:0;background:var(--bg);color:var(--txt);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;font-size:14px}
  a{color:inherit}
  .wrap{max-width:min(1800px,96vw);margin:0 auto;padding:20px 22px 60px}
  header.top{display:flex;flex-wrap:wrap;align-items:baseline;gap:12px;justify-content:space-between;margin-bottom:6px}
  h1{font-size:20px;margin:0;font-weight:700;letter-spacing:.2px}
  .sub{color:var(--mut);font-size:13px;margin:2px 0 16px}
  .status{font-size:12px;color:var(--dim);display:flex;align-items:center;gap:8px}
  .dot{width:8px;height:8px;border-radius:50%;background:var(--good);box-shadow:0 0 8px var(--good)}
  .btn{background:var(--card2);color:var(--txt);border:1px solid var(--line2);border-radius:8px;
    padding:8px 12px;font-size:13px;cursor:pointer;transition:.15s}
  .btn:hover{background:#2a3556;border-color:#3a4670}
  .btn.primary{background:var(--accent);color:#062018;border-color:transparent;font-weight:600}

  .grouphdr{font-size:11px;letter-spacing:1px;color:var(--dim);margin:12px 4px 6px;font-weight:700}
  .evt{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:9px;cursor:pointer;
    border:1px solid transparent}
  .evt:hover{background:var(--card)}
  .evt.sel{background:var(--card2);border-color:var(--line2)}
  .evt .bar{width:3px;align-self:stretch;border-radius:3px;background:var(--dim)}

  /* main panel */
  .panel{background:var(--bg2);border:1px solid var(--line);border-radius:14px;min-height:60vh;overflow:hidden}
  .phead{padding:16px 18px;border-bottom:1px solid var(--line);display:flex;flex-wrap:wrap;
    align-items:center;gap:10px;justify-content:space-between}

  .phead .pm{font-size:12px;color:var(--mut)}
  .tabs{display:flex;gap:4px;padding:10px 14px 0}

    border-radius:9px 9px 0 0;border:1px solid transparent;border-bottom:none}

  .tab .b{display:inline-block;margin-left:7px;font-size:11px;background:var(--bg);border:1px solid var(--line2);
    border-radius:999px;padding:1px 7px;color:var(--mut)}

  .toolbar{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin-bottom:12px}

  .empty{padding:40px 20px;text-align:center;color:var(--dim)}
  .empty .big{font-size:15px;color:var(--mut);margin-bottom:6px}
  .spinner{display:inline-block;width:15px;height:15px;border:2px solid var(--line2);
    border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;vertical-align:-3px}
  @keyframes spin{to{transform:rotate(360deg)}}

  /* sponsor cards */
  .sponsor{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:14px;margin-bottom:12px}
  .sponsor .sh{display:flex;align-items:center;gap:10px;justify-content:space-between;margin-bottom:6px}

  .card-add{background:var(--card);border:1px dashed var(--line2);border-radius:12px;padding:14px;margin-bottom:16px}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
  @media(max-width:600px){.grid2{grid-template-columns:1fr}}
  .field label{display:block;font-size:11px;color:var(--dim);margin:0 0 3px 2px}
  .field input,.field select{width:100%}
  textarea{width:100%;min-height:90px;resize:vertical;font-family:ui-monospace,Menlo,Consolas,monospace;font-size:12px}
  .savechip{font-size:11px;color:var(--dim)}
  .savechip.ok{color:var(--good)}

  /* type badges + print */
  .tb{font-size:10.5px;font-weight:700;padding:2px 8px;border-radius:999px;border:1px solid var(--line2)}
  .tb.del{color:var(--accent);border-color:rgba(0,212,170,.4)}
  .tb.spo{color:var(--pas);border-color:rgba(167,139,250,.4)}
  .tb.spk{color:var(--aaa);border-color:rgba(245,158,11,.4)}
  .tb.stf{color:var(--en);border-color:rgba(56,189,248,.45)}
  .rid{font-family:ui-monospace,Menlo,Consolas,monospace;font-size:12px;color:var(--mut)}
  .cellinput{width:100%;min-width:70px;background:transparent;border:1px solid transparent;border-radius:6px;padding:4px 6px;font-size:12px;color:var(--txt);font-family:inherit}
  .cellinput:hover{border-color:var(--line2)}
  .cellinput:focus{border-color:var(--accent2);background:var(--bg2);outline:none}
  .printhdr{display:none}
  .chk{width:16px;height:16px;border:1.5px solid var(--dim);border-radius:4px;display:inline-block}
  @media print{
    @page{margin:14mm}
    body{background:#fff;color:#000;font-size:12px}
    .side,.tabs,header.top,.toolbar,.savechip,.banner{display:none!important}
    .layout{display:block;gap:0}
    .panel,.side{border:none;background:#fff}
    .wrap{max-width:none;padding:0}
    .phead{border:none;padding:0 0 6px}
    .pt{font-size:16px}
    .tablewrap{max-height:none;overflow:visible;border:none;border-radius:0}
    table{width:100%}
    th{color:#000;background:#fff;border-bottom:1.5px solid #000}
    td{border-bottom:1px solid #ccc}
    a{color:#000;text-decoration:none}
    .tb{border-color:#999;color:#000}
    .chk{border-color:#000}
    .printhdr{display:block!important;margin-bottom:8px}
    .printhdr .pt2{font-size:18px;font-weight:700}
    .printhdr .mt2{font-size:12px;color:#333}
    tr{break-inside:avoid}
  }
</style>

<script type="module">
// ---------- fallback event list (server overrides this on load) ----------
const FALLBACK_EVENTS = [
  {id:'cn-mc-ice',brand:'CN',name:'Masterclass – Internal Comms Events',short:'MC ICE',date:'2026-07-10'},
  {id:'cn-cls',brand:'CN',name:'Creative Leaders Summit',short:'CLS',date:'2026-07-29'},
  {id:'cn-mc-incentives',brand:'CN',name:'Masterclass – Incentives',short:'MC Incentives',date:'2026-08-11'},
  {id:'cn-als',brand:'CN',name:'Agency Leaders Summit',short:'ALS',date:'2026-09-09'},
  {id:'cn-mc-bea',brand:'CN',name:'Masterclass – Brand Events & Activations',short:'MC BE&A',date:'2026-10-08'},
  {id:'cn-cels',brand:'CN',name:'Corporate Event Leaders Summit',short:'CELS',date:'2026-11-25'},
  {id:'cn-mc-pe',brand:'CN',name:'Masterclass – Public Events',short:'MC PE',date:'2027-01-12'},
  {id:'en-lc-consumer',brand:'EN',name:'Launch Club – Consumer Shows',short:'LC Consumer',date:'2026-06-26'},
  {id:'en-lc-trade',brand:'EN',name:'Launch Club – Trade Shows',short:'LC Trade',date:'2026-08-26'},
  {id:'en-ols',brand:'EN',name:'Operations Leaders Summit',short:'OLS',date:'2026-09-13'},
  {id:'en-lc-conferences',brand:'EN',name:'Launch Club – Conferences',short:'LC Conferences',date:'2026-10-08'},
  {id:'en-mls',brand:'EN',name:'Marketing Leaders Summit',short:'MLS',date:'2027-01-14'},
  {id:'en-sls',brand:'EN',name:'Sales Leaders Summit',short:'SLS',date:'2027-01-14'},
  {id:'en-lc-awards',brand:'EN',name:'Launch Club – Awards',short:'LC Awards',date:'2027-01-28'},
  {id:'aaa-ls',brand:'AAA',name:'Leaders Summit',short:'LS',date:'2026-10-07'},
  {id:'aaa-eps',brand:'AAA',name:'Event Producers Summit',short:'EPS',date:'2027-01-21'},
  {id:'pas-dc-legal',brand:'PAS',name:'Diners Club – Legal',short:'DC Legal',date:'2026-06-11'},
  {id:'pas-dc-financial',brand:'PAS',name:'Diners Club – Financial & Prof. Services',short:'DC Financial',date:'2026-09-10'},
  {id:'pas-dc-medical',brand:'PAS',name:'Diners Club – Medical',short:'DC Medical',date:'2026-11-10'},
  {id:'pas-dc-hnwi',brand:'PAS',name:'Diners Club – HNWI',short:'DC HNWI',date:'2027-01-14'},
  {id:'cfx-gets',brand:'CONFEX',name:'GETS',short:'GETS',date:'2026-07-09'},
];
const BRAND_COLORS={CN:'var(--cn)',EN:'var(--en)',AAA:'var(--aaa)',PAS:'var(--pas)',CONFEX:'var(--confex)'};
const BRAND_ORDER=['CN','EN','AAA','PAS','CONFEX'];

// ---------- state ----------
const S={
  events:FALLBACK_EVENTS, counts:{}, selected:null, tab:'delegates',
  brandFilter:new Set(), search:'',
  attendees:{}, loadingAttendees:false, staffRoster:null,
  store:{sponsors:{},speakers:{},delegates:{},seen:{},notes:{},staff:{}}, demo:false,
};
const $=s=>document.querySelector(s);
const el=(t,c,h)=>{const e=document.createElement(t);if(c)e.className=c;if(h!=null)e.innerHTML=h;return e;};
const esc=s=>String(s??'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const uid=()=>Math.random().toString(36).slice(2,9);
// Badge ID for people NOT found in HubSpot: event prefix + 4-digit sequential (e.g. GETS0001)
const BADGE_PREFIX={'cn-mc-ice':'ICE','cn-cls':'CLS','cn-mc-incentives':'INC','cn-als':'ALS','cn-mc-bea':'BEA','cn-cels':'CELS','cn-mc-pe':'PE','en-lc-consumer':'LCCS','en-lc-trade':'LCTS','en-ols':'OLS','en-lc-conferences':'LCCONF','en-mls':'MLS','en-sls':'SLS','en-lc-awards':'LCAW','aaa-ls':'LS','aaa-eps':'EPS','pas-dc-legal':'DCLEG','pas-dc-financial':'DCFIN','pas-dc-medical':'DCMED','pas-dc-hnwi':'DCHNWI','cfx-gets':'GETS'};
function badgePrefix(id){return BADGE_PREFIX[id]||(((S.events.find(e=>e.id===id)||{}).short||'BADGE').toUpperCase().replace(/[^A-Z0-9]/g,'').slice(0,6));}
function maxBadgeNum(id){const pre=badgePrefix(id),re=new RegExp('^'+pre+'(\\d{4,})$');let mx=0;
  const chk=v=>{const m=re.exec(v||'');if(m)mx=Math.max(mx,+m[1]);};
  (S.store.sponsors[id]||[]).forEach(sp=>sp.contacts.forEach(c=>chk(scanOf(c))));
  (S.store.speakers[id]||[]).forEach(s2=>chk(scanOf(s2)));
  ((S.store.delegates||{})[id]||[]).forEach(d=>chk(scanOf(d)));
  return mx;}
function nextBadgeId(id){return badgePrefix(id)+String(maxBadgeNum(id)+1).padStart(4,'0');}
const fmtDate=iso=>{try{return new Date(iso).toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'});}catch{return iso;}};
const fmtAdded=iso=>{if(!iso)return '';try{return new Date(iso).toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'2-digit'});}catch{return '';}};
const scanOf=o=>o.scanId||o.hubspotId||'';
function delNote(ev,rec){return ((S.store.notes||{})[ev]||{})[rec]||'';}
function setDelNote(ev,rec,val){S.store.notes??={};(S.store.notes[ev]??={})[rec]=val;queueSave();}
function cellInput(val,onSave,ph){const i=el('input','cellinput');i.value=val||'';if(ph)i.placeholder=ph;i.oninput=()=>onSave(i.value);return i;}
// ---- multi-user merge: union items by id; same id -> local edit wins ----
function _byId(a,b,deep){const m=new Map();(a||[]).forEach(x=>x&&m.set(x.id,x));(b||[]).forEach(x=>{if(!x)return;const sv=m.get(x.id);if(sv){const del=sv.deleted||x.deleted;m.set(x.id,deep?{...x,deleted:del,contacts:_byId(sv.contacts,x.contacts,false)}:{...x,deleted:del});}else m.set(x.id,x);});return [...m.values()];}
function _lists(sv,lo,deep){sv=sv||{};lo=lo||{};const o={...sv};for(const k of new Set([...Object.keys(sv),...Object.keys(lo)]))o[k]=_byId(sv[k],lo[k],deep);return o;}
function _maps(sv,lo){sv=sv||{};lo=lo||{};const o={};for(const k of new Set([...Object.keys(sv),...Object.keys(lo)]))o[k]={...(sv[k]||{}),...(lo[k]||{})};return o;}
function _seenM(sv,lo){sv=sv||{};lo=lo||{};const o={};for(const k of new Set([...Object.keys(sv),...Object.keys(lo)])){const a=sv[k]||{},b=lo[k]||{};o[k]={baseline:{...(a.baseline||{}),...(b.baseline||{})},added:{...(a.added||{}),...(b.added||{})}};}return o;}
function _rooms(sv,lo){sv=sv||{};lo=lo||{};const o={};new Set([...Object.keys(sv),...Object.keys(lo)]).forEach(k=>{o[k]=Object.assign({},sv[k]||{},lo[k]||{});});return o;}
function mergeStore(sv,lo){sv=sv||{};lo=lo||{};return {sponsors:_lists(sv.sponsors,lo.sponsors,true),speakers:_lists(sv.speakers,lo.speakers,false),delegates:_lists(sv.delegates,lo.delegates,false),staff:_lists(sv.staff,lo.staff,false),seen:_seenM(sv.seen,lo.seen),notes:_maps(sv.notes,lo.notes),onsite:Object.assign({},sv.onsite||{},lo.onsite||{}),rooms:_rooms(sv.rooms,lo.rooms)};}
function isEditing(){const ae=document.activeElement;return !!(ae&&/^(INPUT|TEXTAREA|SELECT)$/.test(ae.tagName)&&$('#tabBody')&&$('#tabBody').contains(ae));}
function sortRows(rows,mode){const r=[...rows];
  if(mode==='added-new')r.sort((a,b)=>(b.addedAt||'').localeCompare(a.addedAt||''));
  else if(mode==='added-old')r.sort((a,b)=>(a.addedAt||'').localeCompare(b.addedAt||''));
  else r.sort((a,b)=>(a.name||'').localeCompare(b.name||''));
  return r;}
function sortSelect(cur,cb){const sel=el('select');sel.innerHTML='<option value="name">Name A–Z</option><option value="added-new">Added (newest)</option><option value="added-old">Added (oldest)</option>';sel.value=cur;sel.style.flex='0 0 auto';sel.onchange=()=>cb(sel.value);return sel;}

// ---------- API ----------
async function api(path,opts){
  const r=await fetch(path,opts);
  if(!r.ok)throw new Error('HTTP '+r.status);
  return r.json();
}
// Match a manually-entered person against HubSpot by email -> Record ID + details
async function lookupOne(email){if(!email||S.demo)return null;try{return (await api('/api/lookup?email='+encodeURIComponent(email))).match;}catch{return null;}}
async function lookupMany(emails){emails=[...new Set(emails.filter(Boolean))];if(S.demo||!emails.length)return {};try{return (await api('/api/lookup',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({emails})})).matches||{};}catch{return {};}}
const mkey=e=>(e||'').trim().toLowerCase();

async function loadSummary(){
  try{
    const d=await api('/api/attendees');
    if(d.events)S.events=d.events;
    S.counts=d.counts||{};
    setStatus(true,'Live from HubSpot');
  }catch(e){
    S.demo=true;
    // demo counts so the layout is explorable without the backend
    S.counts=Object.fromEntries(S.events.map(e=>{const opts=[0,1,2,4,11,19,24,29,33,40,42,60];return [e.id,opts[Math.floor(Math.random()*opts.length)]];}));
    setStatus(false,'Preview (backend not connected)');
  }
}

async function loadStore(){
  try{ S.store=await api('/api/store'); S.store.sponsors??={}; S.store.speakers??={}; S.store.delegates??={}; S.store.seen??={}; S.store.notes??={}; S.store.staff??={}; S.store.onsite??={}; S.store.rooms??={}; }
  catch(e){ /* demo: keep empty local store */ S.store={sponsors:{},speakers:{},delegates:{},seen:{},notes:{},staff:{},onsite:{},rooms:{}}; }
  loadRoomTotals();
}
let saveTimer,saving=false;
function queueSave(){
  clearsave();
  const chip=$('#saveChip'); chip.textContent='Saving…'; chip.className='savechip';
  saveTimer=setTimeout(async()=>{
    saving=true;saveTimer=null;
    try{
      if(S.demo)throw new Error('demo');
      let server={};try{server=await api('/api/store');}catch{}
      const merged=mergeStore(server,S.store);
      await api('/api/store',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify(merged)});
      chip.textContent='Saved ✓'; chip.className='savechip ok';
    }catch{ chip.textContent=S.demo?'Preview — not saved':'Save failed'; chip.className='savechip'; }

let syncTick=0;
async function autoSync(){

async function loadAttendees(id){

function recordSeen(id,list){
  S.store.seen??={};

// ---------- CSV ----------
function toCSV(rows,cols){
  const head=cols.map(c=>c.label).join(',');
  const body=rows.map(r=>cols.map(c=>{
    const v=(c.get?c.get(r):r[c.key])??''; const s=String(v).replace(/"/g,'""');
    return /[",\n]/.test(s)?`"${s}"`:s;
  }).join(',')).join('\n');
  return head+'\n'+body;
}
function download(name,text){
  const b=new Blob([text],{type:'text/csv'}),u=URL.createObjectURL(b),a=document.createElement('a');
  a.href=u;a.download=name;a.click();URL.revokeObjectURL(u);
}

function parseSpeakers(text){
  const out=[];
  text.split(/\r?\n/).forEach((line,i)=>{
    if(!line.trim())return;
    const cells=line.split(/,|\t/).map(c=>c.trim());
    if(i===0&&/^name$/i.test(cells[0]))return; // skip header
    const [name,jobtitle='',company='',email='',session='',dietary='',accessibility='']=cells;
    if(name)out.push({name,jobtitle,company,email,session,dietary,accessibility});
  });
  return out;
}
function field(label,type,ph){
  const wrap=el('div','field');const l=el('label',null,label);const input=el('input');
  input.type=type||'text';if(ph)input.placeholder=ph;wrap.append(l,input);return{wrap,input};
}

    at.appendChild(atb);aw.appendChild(at);attWrap.appendChild(aw);
  }
  function refreshCount(){const shown=[...rtbody.children].filter(tr=>tr.style.display!=='none').length;rc.textContent=attending().length+' attending · '+S.staffRoster.length+' staff'+(stfSearch?(' · '+shown+' shown'):'');}
  function syncChecks(){const set=attendingRoster();[...rtbody.querySelectorAll('input[type=checkbox]')].forEach(cb=>{cb.checked=set.has(cb.dataset.rid);});}
  // roster checklist (built once; search filters in place)
  box.appendChild(el('div','grouphdr','ALL STAFF — tick to add'));
  const wrap=el('div','tablewrap');const t=el('table');
  t.innerHTML='<thead><tr><th style="width:50px">Add</th><th>Name</th><th>Scan ID</th><th>Job title</th><th>Email</th></tr></thead>';
  const rtbody=el('tbody');
  const set0=attendingRoster();
  sortRows(S.staffRoster,stfSort).forEach(pn=>{
    const tr=el('tr');tr.dataset.s=(pn.name+' '+pn.email+' '+pn.jobtitle).toLowerCase();
    const cb=el('input');cb.type='checkbox';cb.dataset.rid=pn.id;cb.checked=set0.has(pn.id);
    cb.onchange=()=>{
      if(cb.checked){list.push({id:uid(),rosterId:pn.id,external:false,scanId:pn.scanId,name:pn.name,firstname:pn.firstname,lastname:pn.lastname,email:pn.email,jobtitle:pn.jobtitle,company:pn.company||'Mash Media',dietary:pn.dietary||'',accessibility:pn.accessibility||'',note:'',addedAt:new Date().toISOString()});}
      else{list.forEach(x=>{if(x.rosterId===pn.id&&!x.deleted){x.deleted=true;clearRoom(S.selected,x.id);}});}
      queueSave();updateTabCounts();renderAtt();refreshCount();
    };
    const ctd=el('td');ctd.appendChild(cb);tr.appendChild(ctd);
    tr.appendChild(el('td',null,`<strong>${esc(pn.name)}</strong>`));
    tr.appendChild(el('td','rid',esc(pn.scanId)||'—'));
    tr.appendChild(el('td',null,esc(pn.jobtitle)||'<span class=muted>—</span>'));
    tr.appendChild(el('td',null,pn.email?`<a href="mailto:${esc(pn.email)}">${esc(pn.email)}</a>`:'—'));
    rtbody.appendChild(tr);
  });
  t.appendChild(rtbody);wrap.appendChild(t);box.appendChild(wrap);
  si.oninput=()=>{stfSearch=si.value;const q=stfSearch.toLowerCase();[...rtbody.children].forEach(tr=>{tr.style.display=(!q||tr.dataset.s.includes(q))?'':'none';});refreshCount();};
  renderAtt();refreshCount();
}

// ---------- tabs ----------
$('#tabs').querySelectorAll('.tab').forEach(t=>{
  t.onclick=async()=>{
    $('#tabs').querySelectorAll('.tab').forEach(x=>x.classList.remove('on'));
    t.classList.add('on');S.tab=t.dataset.tab;
    renderBody();
    if((S.tab==='delegates'||S.tab==='checkin')&&S.selected){await loadAttendees(S.selected);updateTabCounts();renderBody();}
  };
});
$('#evtSearch').oninput=e=>{S.search=e.target.value;renderEvents();};
$('#refreshBtn').onclick=async()=>{S.attendees={};await loadSummary();renderEvents();if(S.selected)selectEvent(S.selected);};

// ---------- theme ----------
function applyTheme(t){document.documentElement.setAttribute('data-theme',t);try{localStorage.setItem('portalTheme',t);}catch{}const b=document.getElementById('themeBtn');if(b)b.textContent=t==='light'?'Dark':'Light';}
(function(){let t='dark';try{t=localStorage.getItem('portalTheme')||'dark';}catch{}applyTheme(t);
  document.getElementById('themeBtn').onclick=()=>applyTheme(document.documentElement.getAttribute('data-theme')==='light'?'dark':'light');})();

// ---------- boot ----------
(async function(){
  renderBrandChips();
  await Promise.all([loadSummary(),loadStore()]);
  renderEvents();
  // auto-select the soonest upcoming event
  const today=new Date().toISOString().slice(0,10);
  const upcoming=[...S.events].filter(e=>e.date>=today).sort((a,b)=>a.date.localeCompare(b.date))[0]||S.events[0];
  if(upcoming)selectEvent(upcoming.id);
  setInterval(autoSync,30000);
})();
</script>
</body>
